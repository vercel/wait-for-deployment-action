name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm exec biome ci

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Verify dist/index.js is in sync with src/
        # If this fails, run `pnpm build` locally and commit dist/index.js.
        run: |
          if ! git diff --quiet dist/; then
            echo "::error::dist/ is out of sync with src/. Run \`pnpm build\` and commit the result."
            git diff dist/ | head -200
            exit 1
          fi
